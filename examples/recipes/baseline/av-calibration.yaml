

# ============================================================================
# Sensor Bar Card Plus Recipe: AV Calibration
# ============================================================================
#
# This recipe demonstrates baseline-centered telemetry for audio/video
# calibration and tuning workflows.
#
# Baseline mode is ideal for values that naturally oscillate around a neutral
# or calibrated reference point.
#
# Replace the demo entities below with your own Home Assistant sensors.
#
# Demo helpers used here come from:
# examples/packages/sensor_bar_card_plus_playground_package.yaml
#
# Recommended real-world entities:
#
# - stereo balance
# - speaker delay offset
# - projector keystone correction
# - white balance tint
# - exposure bias
# - phase alignment
# - calibration deviation metrics
#
# ============================================================================


type: custom:sensor-bar-card-plus
title: AV Calibration

entities:
  - entity: sensor.sbcp_showcase_balance
    name: Stereo Balance
    icon: mdi:surround-sound

    scale:
      min:
        fixed: -100
      max:
        fixed: 100

    baseline:
      fixed: 0

  - entity: sensor.sbcp_showcase_phase
    name: Phase Alignment
    icon: mdi:sine-wave

    scale:
      min:
        fixed: -1
      max:
        fixed: 1

    baseline:
      fixed: 0

  - entity: sensor.sbcp_showcase_sample_offset
    name: Sample Offset
    icon: mdi:waveform

    scale:
      min:
        fixed: -100
      max:
        fixed: 100

    baseline:
      fixed: 0

  - entity: sensor.sbcp_showcase_tint
    name: Tint Offset
    icon: mdi:palette

    scale:
      min:
        fixed: -100
      max:
        fixed: 100

    baseline:
      fixed: 0

  - entity: sensor.sbcp_showcase_exposure
    name: Exposure Bias
    icon: mdi:brightness-6

    scale:
      min:
        fixed: -3
      max:
        fixed: 3

    baseline:
      fixed: 0

  - entity: sensor.sbcp_showcase_keystone
    name: Keystone
    icon: mdi:projector

    scale:
      min:
        fixed: -50
      max:
        fixed: 50

    baseline:
      fixed: 0

layout:
  height: 28

  label:
    position: left
    width: 130

bar:
  fill_style: soft_bands

  segments:
    - from: -100
      to: -60
      color: '#2563eb'

    - from: -60
      to: -15
      color: '#38bdf8'

    - from: -15
      to: 15
      color: '#111827'

    - from: 15
      to: 60
      color: '#f59e0b'

    - from: 60
      to: 100
      color: '#ef4444'

peak:
  show: true
  color: '#facc15'