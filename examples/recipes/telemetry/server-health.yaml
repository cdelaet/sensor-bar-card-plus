

# ============================================================================
# Sensor Bar Card Plus Recipe: Server Health
# ============================================================================
#
# This recipe demonstrates compact server and infrastructure monitoring.
#
# Sensor Bar Card Plus works especially well for dense telemetry dashboards
# where multiple operational metrics need to be visible simultaneously.
#
# Replace the demo entities below with your own Home Assistant sensors.
#
# Demo helpers used here come from:
# examples/packages/sensor_bar_card_plus_playground_package.yaml
#
# Recommended real-world entities:
#
# - CPU usage
# - memory usage
# - storage usage
# - network utilization
# - container load
# - NAS health
# - disk temperature
# - backup status
#
# ============================================================================

type: custom:sensor-bar-card-plus
title: Server Health

entities:
  - entity: sensor.sbcp_showcase_cpu
    name: CPU
    icon: mdi:chip

    scale:
      min:
        fixed: 0
      max:
        fixed: 100

    target:
      fixed: 80

  - entity: sensor.sbcp_showcase_memory
    name: Memory
    icon: mdi:memory

    scale:
      min:
        fixed: 0
      max:
        fixed: 100

    target:
      fixed: 85

  - entity: sensor.sbcp_showcase_storage
    name: Storage
    icon: mdi:database

    scale:
      min:
        fixed: 0
      max:
        fixed: 100

    target:
      fixed: 90

  - entity: sensor.sbcp_showcase_network
    name: Network
    icon: mdi:wifi

    scale:
      min:
        fixed: 0
      max:
        fixed: 100

    target:
      fixed: 75

  - entity: sensor.sbcp_showcase_container_load
    name: Containers
    icon: mdi:docker

    scale:
      min:
        fixed: 0
      max:
        fixed: 100

    target:
      fixed: 70

  - entity: sensor.sbcp_showcase_disk_temp
    name: Disk Temp
    icon: mdi:harddisk

    scale:
      min:
        fixed: 20
      max:
        fixed: 70

    target:
      fixed: 50

layout:
  height: 24

  label:
    position: left
    width: 130

bar:
  fill_style: soft_bands

  segments:
    - from: 0
      to: 40
      color: '#22c55e'

    - from: 40
      to: 65
      color: '#84cc16'

    - from: 65
      to: 85
      color: '#facc15'

    - from: 85
      to: 100
      color: '#ef4444'

  above_target_color: '#f97316'

target:
  show: true
  color: '#ffffff'

peak:
  show: true
  color: '#fb923c'