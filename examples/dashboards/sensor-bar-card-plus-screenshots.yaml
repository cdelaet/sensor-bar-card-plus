title: Sensor Bar Card Plus Screenshots
views:
- title: Screenshots
  path: sensor-bar-card-plus-screenshots
  icon: mdi:image-multiple
  badges: []
  cards:
  - type: vertical-stack
    cards:
    - type: markdown
      content: |
        # Sensor Bar Card Plus Screenshot Board
        Clean, single-column capture surface for repository screenshots.

        Uses the same helpers and template sensors as the playground package.
    - type: markdown
      content: |
        ## Hero README Screenshots
        Capture-ready Hero cards for README images, size comparisons, and responsive behavior.
    - type: custom:sensor-bar-card-plus
      title: Hero Sizes
      entities:
      - entity: sensor.sbcp_hero_shot_solar
        name: Solar Production
        icon: mdi:solar-power
        scale:
          min:
            fixed: 0
          max:
            fixed: 10
        layout:
          label:
            hero_size: small
      - entity: sensor.sbcp_hero_shot_grid
        name: Grid Flow
        icon: mdi:transmission-tower-export
        scale:
          min:
            fixed: -10
          max:
            fixed: 10
        layout:
          label:
            hero_size: medium
      - entity: sensor.sbcp_hero_shot_battery
        name: Battery State
        icon: mdi:home-battery
        formatting:
          decimal: 0
        scale:
          min:
            fixed: 0
          max:
            fixed: 100
        layout:
          label:
            hero_size: large
      layout:
        height: 40
        label:
          position: hero
      formatting:
        decimal: 1
      bar:
        fill_style: band_gradient
        segments:
        - from: 0%
          to: 24%
          color: '#0f172a'
        - from: 24%
          to: 52%
          color: '#0369a1'
        - from: 52%
          to: 78%
          color: '#22c55e'
        - from: 78%
          to: 100%
          color: '#fde047'
